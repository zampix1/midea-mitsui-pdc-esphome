    device_class: voltage
    state_class: measurement
    entity_category: diagnostic

  - platform: template
    name: "PDC Mitsui Thermal Power Estimated"
    id: pdc_thermal_power_estimated
    lambda: |-
      if (!id(pdc_water_flow).has_state() || !id(pdc_water_in).has_state() || !id(pdc_water_out).has_state()) return NAN;
      float delta = id(pdc_water_out).state - id(pdc_water_in).state;
      if (id(pdc_mode_raw).has_state() && ((uint16_t) id(pdc_mode_raw).state) == 2) {
        delta = id(pdc_water_in).state - id(pdc_water_out).state;
      }
      float kw = id(pdc_water_flow).state * delta * 1.163f;
      if (kw < 0.0f) kw = 0.0f;
      return kw;
    unit_of_measurement: "kW"
    accuracy_decimals: 2
    device_class: power
    state_class: measurement
    update_interval: 10s

