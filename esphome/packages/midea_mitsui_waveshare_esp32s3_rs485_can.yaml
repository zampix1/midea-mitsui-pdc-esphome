number:
  - platform: modbus_controller
    modbus_controller_id: pdc
    name: "PDC Mitsui Setpoint Water Target"
    id: pdc_setpoint_water_target
    address: 11
    register_type: holding
    value_type: U_WORD
    unit_of_measurement: "\u00B0C"
    device_class: temperature
    entity_category: config
    min_value: 5
    max_value: 60
    step: 1
    mode: box
    lambda: |-
      return x;
    write_lambda: |-
      if (!id(pdc_mode_raw).has_state()) {
        ESP_LOGW("pdc", "Refusing water setpoint write %.0f C: operating mode unavailable", x);
        return {};
      }
      uint16_t mode = (uint16_t) id(pdc_mode_raw).state;
      if (mode == 2 && (x < 5 || x > 25)) {
        ESP_LOGW("pdc", "Refusing cooling water setpoint write %.0f C outside 5..25 C", x);
        return {};
      }
      if (mode == 3 && (x < 25 || x > 60)) {
        ESP_LOGW("pdc", "Refusing heating water setpoint write %.0f C outside 25..60 C", x);
        return {};
      }
      if (mode != 2 && mode != 3) {
        ESP_LOGW("pdc", "Refusing water setpoint write %.0f C: unsupported mode %u", x, mode);
        return {};
      }
      return x;

text_sensor:
  - platform: version
    name: "PDC Mitsui ESPHome Version"
    entity_category: diagnostic

  - platform: template
    name: "PDC Mitsui Operating Mode"
    icon: mdi:heat-pump
    lambda: |-
      if (!id(pdc_mode_raw).has_state()) return std::string("unknown");
      switch ((uint16_t) id(pdc_mode_raw).state) {
        case 0: return std::string("off");
        case 1: return std::string("auto");
        case 2: return std::string("cooling");
        case 3: return std::string("heating");
        default: return std::string("unknown");
      }
    update_interval: 10s

  - platform: template
    name: "PDC Mitsui Mode Set"
    icon: mdi:heat-pump-outline
    lambda: |-
      if (!id(pdc_mode_set_raw).has_state()) return std::string("unknown");
      switch ((uint16_t) id(pdc_mode_set_raw).state) {
        case 0: return std::string("off");
        case 1: return std::string("auto");
        case 2: return std::string("cooling");
        case 3: return std::string("heating");
        default: return std::string("unknown");
      }
    update_interval: 10s

