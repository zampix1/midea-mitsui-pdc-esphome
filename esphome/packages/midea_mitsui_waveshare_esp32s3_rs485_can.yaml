  - platform: template
    name: "PDC Mitsui Energy Consumption"
    lambda: |-
      if (!id(pdc_energy_consumption_high_raw).has_state() || !id(pdc_energy_consumption_low_raw).has_state()) return NAN;
      return id(pdc_energy_consumption_high_raw).state * 65536.0f + id(pdc_energy_consumption_low_raw).state;
    unit_of_measurement: "kWh"
