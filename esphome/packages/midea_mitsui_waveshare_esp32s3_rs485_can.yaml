    value_type: U_WORD
    unit_of_measurement: "steps"
    accuracy_decimals: 0
    state_class: measurement

  - platform: template
    name: "PDC Mitsui PMV Percent"
    lambda: |-
      if (!id(pdc_pmv_steps).has_state()) return NAN;
      float pct = id(pdc_pmv_steps).state * 100.0f / 480.0f;
      if (pct < 0.0f) pct = 0.0f;
      if (pct > 100.0f) pct = 100.0f;
      return pct;
    unit_of_measurement: "%"
    accuracy_decimals: 1
    state_class: measurement
    update_interval: 10s

  - platform: modbus_controller
    modbus_controller_id: pdc
    name: "PDC Mitsui Water Inlet"
    id: pdc_water_in
    address: 104
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "\u00B0C"
    accuracy_decimals: 0
    device_class: temperature
    state_class: measurement

  - platform: modbus_controller
    modbus_controller_id: pdc
    name: "PDC Mitsui Water Outlet"
    id: pdc_water_out
    address: 105
    register_type: holding
    value_type: S_WORD
    unit_of_measurement: "\u00B0C"
    accuracy_decimals: 0
    device_class: temperature
    state_class: measurement

  - platform: template
    name: "PDC Mitsui Delta T Outlet Minus Inlet"
    id: pdc_delta_out_minus_in
    lambda: |-
      if (!id(pdc_water_in).has_state() || !id(pdc_water_out).has_state()) return NAN;
      return id(pdc_water_out).state - id(pdc_water_in).state;
    unit_of_measurement: "\u00B0C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    update_interval: 10s

  - platform: modbus_controller
