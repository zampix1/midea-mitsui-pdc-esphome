substitutions:
  devicename: pdc-mitsui-esp32
  friendly_name: "PDC Mitsui ESP32"
  pdc_uart_tx_pin: GPIO17
  pdc_uart_rx_pin: GPIO18
  pdc_rs485_flow_control_pin: GPIO21
  pdc_uart_baud_rate: "9600"
  pdc_modbus_slave_address: "1"
  pdc_modbus_send_wait_time: 300ms
  pdc_modbus_command_throttle: 350ms
  pdc_modbus_update_interval: 10s
  pdc_modbus_offline_skip_updates: "3"

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  comment: "Mitsui/Midea heat pump Modbus RTU bridge"
  platformio_options:
    board_build.arduino.usb_mode: "cdc"
    board_build.arduino.usb_cdc_on_boot: "1"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: arduino
    version: recommended

logger:
  level: INFO
  baud_rate: 115200
  hardware_uart: USB_SERIAL_JTAG

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

safe_mode:

mdns:
  disabled: false

captive_portal:

web_server:
  port: 80
  version: 3

uart:
  id: mod_bus
  tx_pin: ${pdc_uart_tx_pin}
  rx_pin: ${pdc_uart_rx_pin}
  baud_rate: ${pdc_uart_baud_rate}
  stop_bits: 1
  parity: NONE
  # 8N1: matches the Raspberry/mbpoll path.

modbus:
  id: heatpump_modbus
  uart_id: mod_bus
  flow_control_pin: ${pdc_rs485_flow_control_pin}
  send_wait_time: ${pdc_modbus_send_wait_time}

modbus_controller:
  - id: pdc
    address: ${pdc_modbus_slave_address}
    modbus_id: heatpump_modbus
    setup_priority: -10
    command_throttle: ${pdc_modbus_command_throttle}
    update_interval: ${pdc_modbus_update_interval}
    offline_skip_updates: ${pdc_modbus_offline_skip_updates}

sensor:
  - platform: uptime
    name: "PDC Mitsui ESP32 Uptime"
    entity_category: diagnostic

  - platform: wifi_signal
    name: "PDC Mitsui ESP32 WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: pdc
    name: "PDC Mitsui Power Flags Raw"
    id: pdc_power_flags_raw
    address: 0
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: pdc
    name: "PDC Mitsui Mode Set Raw"
    id: pdc_mode_set_raw
    address: 1
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: pdc
    name: "PDC Mitsui Setpoint Word Raw"
    id: pdc_setpoint_word_raw
    address: 2
    register_type: holding
    value_type: U_WORD
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: template
    name: "PDC Mitsui Setpoint Word High Byte"
    lambda: |-
      if (!id(pdc_setpoint_word_raw).has_state()) return NAN;
      return ((uint16_t) id(pdc_setpoint_word_raw).state >> 8) & 0xFF;
    unit_of_measurement: "\u00B0C"
    accuracy_decimals: 0
    device_class: temperature
    entity_category: diagnostic

  - platform: template
    name: "PDC Mitsui Setpoint Word Low Byte"
    lambda: |-
      if (!id(pdc_setpoint_word_raw).has_state()) return NAN;
      return ((uint16_t) id(pdc_setpoint_word_raw).state) & 0xFF;
    unit_of_measurement: "\u00B0C"
    accuracy_decimals: 0
    device_class: temperature
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: pdc
    name: "PDC Mitsui Function Flags Raw"
    id: pdc_function_flags_raw
    address: 5
    register_type: holding
    value_type: U_WORD
    skip_updates: 2
    accuracy_decimals: 0
    entity_category: diagnostic

  - platform: modbus_controller
    modbus_controller_id: pdc
